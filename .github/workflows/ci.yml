name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Run headless self-test
        run: swift run DittoMac --selftest

  package:
    name: Package DMG
    runs-on: macos-14
    needs: build
    # Build a DMG on every push to main and on tags; releases only on tags.
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package Ditto.app + DMG
        run: bash scripts/package-dmg.sh

      - name: Verify signature
        run: codesign -dv dist/Ditto.app 2>&1 || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ditto-macOS.dmg
          path: dist/Ditto-macOS.dmg

      - name: Upload .app artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: Ditto.app
          path: dist/Ditto.app

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Ditto-macOS.dmg
